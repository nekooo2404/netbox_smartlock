services:
  netbox:
    extra_hosts:
      - "keycloak.local:host-gateway"
      - "keycloak.localtest.me:host-gateway"

  netbox-worker:
    extra_hosts:
      - "keycloak.local:host-gateway"
      - "keycloak.localtest.me:host-gateway"

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    command:
      - ${KEYCLOAK_START_COMMAND:-start-dev}
      - --http-port=8080
      - --hostname=${KEYCLOAK_HOSTNAME:-http://keycloak.localtest.me:8080}
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_BASE_URL: ${KEYCLOAK_BASE_URL:-http://keycloak.localtest.me:8080}
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_LDAP_CONNECTION_URL: ${KEYCLOAK_LDAP_CONNECTION_URL:-ldap://ldap:389}
      KEYCLOAK_LDAP_BIND_DN: ${KEYCLOAK_LDAP_BIND_DN:-cn=admin,dc=example,dc=org}
      KEYCLOAK_LDAP_BIND_CREDENTIAL: ${KEYCLOAK_LDAP_BIND_CREDENTIAL:-admin}
      KEYCLOAK_LDAP_USERS_DN: ${KEYCLOAK_LDAP_USERS_DN:-ou=users,dc=example,dc=org}
      KEYCLOAK_LDAP_GROUPS_DN: ${KEYCLOAK_LDAP_GROUPS_DN:-ou=groups,dc=example,dc=org}
      KEYCLOAK_LDAP_USE_TRUSTSTORE_SPI: ${KEYCLOAK_LDAP_USE_TRUSTSTORE_SPI:-ldapsOnly}
    ports:
      - "8080:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./keycloak/realm-netbox-dev.json:/opt/keycloak/data/import/realm-netbox-dev.json:ro
    depends_on:
      ldap:
        condition: service_healthy
    networks:
      default:
        aliases:
          - keycloak.local
          - keycloak.localtest.me

  ldap:
    image: osixia/openldap:1.5.0
    environment:
      LDAP_ORGANISATION: NetBox SmartLock
      LDAP_DOMAIN: example.org
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD:-admin}
      LDAP_CONFIG_PASSWORD: ${LDAP_CONFIG_PASSWORD:-config}
    ports:
      - "3890:389"
    volumes:
      - ldap-data:/var/lib/ldap
      - ldap-config:/etc/ldap/slapd.d
      - ./ldap/bootstrap:/container/service/slapd/assets/config/bootstrap/ldif/custom:ro
    command:
      - --copy-service
    healthcheck:
      test: ldapsearch -x -H ldap://localhost:389 -D cn=admin,dc=example,dc=org -w ${LDAP_ADMIN_PASSWORD:-admin} -b dc=example,dc=org -s base dn
      start_period: 20s
      timeout: 5s
      interval: 10s
      retries: 12

volumes:
  keycloak-data:
    driver: local
  ldap-data:
    driver: local
  ldap-config:
    driver: local
